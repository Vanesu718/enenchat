<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✅ 修复版本 v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,"PingFang SC",sans-serif;background:#e8d5c8;}
.chat-page{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:flex;
  flex-direction:column;
}
.chat-header{height:50px;background:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;border-bottom:1px solid #ddd;}
.chat-content{flex:1;overflow-y:auto;padding:15px;-webkit-overflow-scrolling:touch;}
.msg{margin-bottom:12px;padding:10px 14px;border-radius:12px;max-width:80%;font-size:14px;line-height:1.5;}
.msg-l{background:white;margin-right:auto;}
.msg-r{background:#95ec69;margin-left:auto;}
.input-bar{display:flex;align-items:center;padding:8px 12px;background:rgba(255,255,255,0.9);border-top:1px solid #ddd;flex-shrink:0;gap:8px;}
.input-bar input{flex:1;height:36px;border:1px solid #ddd;border-radius:18px;padding:0 15px;font-size:16px;outline:none;background:white;}
.input-bar button{height:36px;padding:0 15px;background:#f0b8c8;border:none;border-radius:18px;color:white;font-size:14px;}
.tag{position:fixed;top:55px;left:5px;background:green;color:white;font-size:11px;padding:3px 8px;border-radius:4px;z-index:99999;}
</style>
</head>
<body>
<div class="tag">✅ v5 - 完美适配</div>
<div class="chat-page" id="chatPage">
  <div class="chat-header">✅ 修复版本 v5</div>
  <div class="chat-content" id="cc">
    <div class="msg msg-l">你好呀~</div><div class="msg msg-r">你好！</div>
    <div class="msg msg-l">今天天气真好</div><div class="msg msg-r">是呀，出去走走吧</div>
    <div class="msg msg-l">好呀，去公园怎么样？</div><div class="msg msg-r">可以的，走起</div>
    <div class="msg msg-l">那我换个衣服</div><div class="msg msg-r">好的，不急</div>
    <div class="msg msg-l">我准备好了</div><div class="msg msg-r">走吧！</div>
    <div class="msg msg-l">看，樱花开了</div><div class="msg msg-r">真漂亮，拍个照</div>
    <div class="msg msg-l">笑一个~ 📸</div><div class="msg msg-r">不要偷拍我啦</div>
    <div class="msg msg-l">太晚了，回去吧</div><div class="msg msg-r">好的，今天很开心</div>
    <div class="msg msg-l">下次再一起出来玩～</div><div class="msg msg-r">一定的！</div>
    <div class="msg msg-l">晚安💤</div><div class="msg msg-r">晚安~</div>
  </div>
  <div class="input-bar">
    <input type="text" id="chatInput" placeholder="输入消息...">
    <button>发送</button>
  </div>
</div>
<script>
(function() {
  var chatPage = document.getElementById('chatPage');
  var cc = document.getElementById('cc');
  
  // 滚动聊天到底部
  function scrollToBottom() {
    cc.scrollTop = cc.scrollHeight;
  }
  
  scrollToBottom();

  // ===== 核心修复：用 visualViewport 动态调整容器高度 =====
  if (window.visualViewport) {
    
    function updateLayout() {
      var vh = window.visualViewport.height;
      var offsetTop = window.visualViewport.offsetTop;
      
      // 设置容器高度为可视区域高度
      chatPage.style.height = vh + 'px';
      chatPage.style.top = offsetTop + 'px';
      chatPage.style.bottom = 'auto';
      
      // 延迟滚动，确保布局完成后再滚
      setTimeout(scrollToBottom, 50);
      setTimeout(scrollToBottom, 150);
      setTimeout(scrollToBottom, 300);
    }
    
    window.visualViewport.addEventListener('resize', function() {
      requestAnimationFrame(updateLayout);
    });
    
    window.visualViewport.addEventListener('scroll', function() {
      requestAnimationFrame(function() {
        var offsetTop = window.visualViewport.offsetTop;
        chatPage.style.top = offsetTop + 'px';
      });
    });
    
    // 初始化
    updateLayout();
  }
})();
</script>
</body>
</html>
