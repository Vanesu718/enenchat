<!-- Red Packet Send Modal -->
    <div id="redPacketSendModal" class="rp-overlay" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
      <div class="rp-send-card">
        <div class="rp-card-top">
          <button class="rp-card-close" onclick="document.getElementById('redPacketSendModal').style.display='none'">&#x2715;</button>
          <div class="rp-card-title">&#x53D1;&#x7EA2;&#x5305;</div>
          <div class="rp-cover-wrap" id="rpCoverPreview" onclick="document.getElementById('rpCoverInput').click()">
            <div class="rp-cover-placeholder">
              <span class="rp-upload-icon">&#x1F5BC;</span>
              <span class="rp-upload-text">&#x70B9;&#x51FB;&#x4E0A;&#x4F20;&#x5C01;&#x9762;</span>
            </div>
          </div>
          <input type="file" id="rpCoverInput" accept="image/*" style="display:none;" onchange="handleRpCover(this)">
        </div>
        <div class="rp-card-bottom">
          <div class="rp-field">
            <label class="rp-label">&#x91D1;&#x989D;&#xFF08;&#x5143;&#xFF09;</label>
            <input type="number" id="rpAmount" class="rp-input" placeholder="0.00" step="0.01" min="0.01" oninput="document.getElementById('rpAmountDisplay').textContent=this.value||'0.00'">
          </div>
          <div class="rp-field">
            <label class="rp-label">&#x795D;&#x798F;&#x8BED;</label>
            <textarea id="rpGreeting" class="rp-textarea" placeholder="&#x606D;&#x559C;&#x53D1;&#x8D22;&#xFF0C;&#x5927;&#x5409;&#x5927;&#x5229;">&#x606D;&#x559C;&#x53D1;&#x8D22;&#xFF0C;&#x5927;&#x5409;&#x5927;&#x5229;</textarea>
          </div>
          <div class="rp-amount-preview">&#xFFE5;<span id="rpAmountDisplay">0.00</span></div>
          <button class="rp-send-btn" onclick="sendRedPacket()">&#x585E;&#x9322;&#x8FDB;&#x7EA2;&#x5305;</button>
        </div>
      </div>
    </div>
